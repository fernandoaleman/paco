# paco tmux config

# Mouse + indexing
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Snappy mode switching
set -g escape-time 0
set -g focus-events on

# Truecolor + ghostty-compatible terminfo
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Sesh — prefix + o opens session picker via gum
bind o run-shell "sesh connect \$(sesh list -tH | gum filter --placeholder='Session: ' --prompt='⚡ ')"

# vim-tmux-navigator: Ctrl+hjkl moves between tmux panes AND nvim splits
# (nvim plugin side lands in iter 13c)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
