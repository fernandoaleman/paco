# vim: set ft=sh:
# paco-shipped per-user makepkg config. Loaded after /etc/makepkg.conf.
# Disables the -debug subpackage that Arch's makepkg generates by default,
# so AUR builds don't leave behind orphan -debug packages.
#
# To re-enable for a specific package, add `options=(debug)` to its PKGBUILD.

OPTIONS+=(!debug)
