<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- sans-serif → Liberation Sans (with Noto fallback) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- serif → Liberation Serif (with Noto fallback) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <!-- monospace → JetBrainsMono Nerd Font (with Liberation Mono fallback) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family>
      <family>Liberation Mono</family>
    </prefer>
  </alias>

  <!-- system-ui (used by GTK4/web) → Liberation Sans -->
  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <!-- emoji → Noto Color Emoji -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
