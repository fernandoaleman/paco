# paco-shipped systemd user-env file. Read by systemd's user manager at
# session start and inherited by all processes (graphical apps + shells)
# launched in that session.
#
# Routes Docker-API clients (lazydocker, docker CLI, docker-compose) to
# podman's user socket. The %U specifier expands to the user's UID at
# session start.

DOCKER_HOST=unix:///run/user/%U/podman/podman.sock
