# systemd-user environment for paco.
#
# Read by `systemd --user` at session start. PATH set here propagates
# to every process launched by the user systemd manager, which on
# paco's stack means Hyprland, Vicinae, waybar, and any .desktop
# launcher Vicinae fires. Without it, .desktop entries like
# `Exec=paco-launch-webapp <url>` can't resolve the binary because
# /etc/profile.d/paco.sh is only read by login shells.

PATH=${PATH}:/usr/share/paco/bin
