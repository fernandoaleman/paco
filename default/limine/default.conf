# paco /etc/default/limine template.
# @@CMDLINE@@ is substituted at install time with the current kernel cmdline
# extracted from the existing limine config (preserves LUKS/btrfs/root args).

TARGET_OS_NAME="paco"

ESP_PATH="/boot"

KERNEL_CMDLINE[default]+="@@CMDLINE@@"
KERNEL_CMDLINE[default]+=" quiet splash loglevel=0 systemd.show_status=false rd.udev.log_level=0 vt.global_cursor_default=0"

ENABLE_UKI=yes
CUSTOM_UKI_NAME="paco"

ENABLE_LIMINE_FALLBACK=yes

# Find and add other bootloaders (Windows, etc.) — harmless if none.
FIND_BOOTLOADERS=yes

BOOT_ORDER="*, *fallback, Snapshots"

MAX_SNAPSHOT_ENTRIES=5

SNAPSHOT_FORMAT_CHOICE=5
