### paco Limine bootloader config.
### Reference: https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md
###
### Boot entries (the `/+ ...` lines) get appended automatically by
### limine-mkinitcpio-hook + limine-snapper-sync. Don't edit those manually —
### regenerate via `limine-update` if needed.

#timeout: 3
default_entry: 2
interface_branding: paco Bootloader
interface_branding_color: a6da95
interface_help_color: a6da95
interface_help_color_bright: a6da95
hash_mismatch_panic: no

# Catppuccin Macchiato palette (matches paco's default theme).
term_background: 24273a
backdrop: 24273a

# Normal terminal colors: black, red, green, yellow, blue, magenta, cyan, white
term_palette: 494d64;ed8796;a6da95;eed49f;8aadf4;f5bde6;8bd5ca;b8c0e0
# Bright variants
term_palette_bright: 5b6078;ed8796;a6da95;eed49f;8aadf4;f5bde6;8bd5ca;a5adcb

# Text colors
term_foreground: cad3f5
term_foreground_bright: cad3f5
term_background_bright: 363a4f
